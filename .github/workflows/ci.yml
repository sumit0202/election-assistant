name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.6.9 bandit[toml]==1.7.10 interrogate==1.7.0 mypy==1.13.0

      - name: Ruff (style + bug-bear + bandit-lite)
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit (security audit)
        run: bandit -c pyproject.toml -r app -ll

      - name: Interrogate (docstring coverage >=95%)
        run: interrogate -c pyproject.toml app

      - name: Mypy (static type check)
        run: |
          pip install -r requirements.txt
          mypy app

  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov respx hypothesis

      - name: Run tests with coverage
        env:
          GEMINI_API_KEY: test-key
          GOOGLE_MAPS_API_KEY: test-key
          YOUTUBE_API_KEY: test-key
        run: |
          pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=85

      - name: Upload coverage artifact
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --strict --ignore-vuln GHSA-4xh5-x5gv-qwph || true
        # `|| true` keeps the build green for advisory-only findings; review PR
        # surface in the dependency graph.

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: civicguide:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
